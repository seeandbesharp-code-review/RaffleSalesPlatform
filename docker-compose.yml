services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trickytray-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Redis__ConnectionString=redis:6379,password=TrickyTrayRedis123
    depends_on:
      - redis
    networks:
      - trickytray-network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: trickytray-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass TrickyTrayRedis123
    networks:
      - trickytray-network
    restart: unless-stopped
    volumes:
      - redis-data:/data

  load-balancer:
    image: nginx:latest
    container_name: trickytray-load-balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - trickytray-network
    restart: unless-stopped   

networks:
  trickytray-network:
    driver: bridge

volumes:
  redis-data:
